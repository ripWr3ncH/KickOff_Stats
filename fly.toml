# fly.toml — KickOff Stats
# Run `fly launch` first to register the app, then `fly deploy`

app = "kickoff-stats"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV        = "production"
  APP_DEBUG      = "false"
  DB_CONNECTION  = "sqlite"
  DB_DATABASE    = "/var/www/html/database/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE    = "file"
  QUEUE_CONNECTION = "sync"
  LOG_CHANNEL    = "stderr"
  LOG_LEVEL      = "error"

[[services]]
  internal_port = 80
  protocol      = "tcp"
  auto_stop_machines  = false
  auto_start_machines = true

  [[services.ports]]
    handlers = ["http"]
    port     = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [services.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval      = 30000
    timeout       = 10000
    grace_period  = "120s"
    method        = "GET"
    path          = "/"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
